<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="title">Password Strength Checker</h1>
    <div id="effect">
        <div id="password-checker">
            <div id="strength">
                <label id="enterPswrd">Enter your password: </label><br><br>
                <input type="password" id="password" name="password"><br><br>
                <button id="submit"><b>Check Strength</b></button>
                <h3 id="result"></h3>
            </div><br>
        </div>
    </div>
    <div id="resultBlock">
        <h3 id="result"></h3>
    </div>
    <script src="script.js"></script>
</body>
</html>
